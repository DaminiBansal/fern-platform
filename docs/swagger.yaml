basePath: /
definitions:
  api.CreateJiraConnectionRequest:
    properties:
      authenticationType:
        type: string
      credential:
        type: string
      jiraUrl:
        type: string
      name:
        type: string
      projectKey:
        type: string
      username:
        type: string
    required:
    - authenticationType
    - credential
    - jiraUrl
    - name
    - projectKey
    type: object
  api.JiraConnectionResponse:
    properties:
      authenticationType:
        type: string
      createdAt:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      jiraUrl:
        type: string
      lastTestedAt:
        type: string
      name:
        type: string
      projectId:
        type: string
      projectKey:
        type: string
      status:
        type: string
      updatedAt:
        type: string
      username:
        type: string
    type: object
  api.SpecRun:
    properties:
      end_time:
        type: string
      id:
        type: integer
      message:
        type: string
      spec_description:
        type: string
      start_time:
        type: string
      status:
        type: string
      suite_id:
        type: integer
      tags:
        items:
          $ref: '#/definitions/api.Tag'
        type: array
    type: object
  api.SuiteRun:
    properties:
      end_time:
        type: string
      id:
        type: integer
      spec_runs:
        items:
          $ref: '#/definitions/api.SpecRun'
        type: array
      start_time:
        type: string
      suite_name:
        type: string
      tags:
        items:
          $ref: '#/definitions/api.Tag'
        type: array
      test_run_id:
        type: integer
    type: object
  api.Tag:
    properties:
      category:
        type: string
      id:
        type: integer
      name:
        type: string
      value:
        type: string
    type: object
  api.TestRunRequest:
    properties:
      build_trigger_actor:
        type: string
      build_url:
        type: string
      end_time:
        type: string
      environment:
        type: string
      git_branch:
        type: string
      git_sha:
        type: string
      id:
        type: integer
      start_time:
        type: string
      suite_runs:
        items:
          $ref: '#/definitions/api.SuiteRun'
        type: array
      tags:
        items:
          $ref: '#/definitions/api.Tag'
        type: array
      test_project_id:
        type: string
      test_project_name:
        type: string
      test_seed:
        type: integer
    type: object
  api.UpdateJiraConnectionRequest:
    properties:
      jiraUrl:
        type: string
      name:
        type: string
      projectKey:
        type: string
    type: object
  api.UpdateJiraCredentialsRequest:
    properties:
      authenticationType:
        type: string
      credential:
        type: string
      username:
        type: string
    required:
    - authenticationType
    - credential
    type: object
info:
  contact:
    name: Fern Platform Team
    url: https://github.com/guidewire-oss/fern-platform/issues
  description: Unified test intelligence platform — aggregate, analyze and act on
    test results from any CI/CD pipeline.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://github.com/guidewire-oss/fern-platform
  title: Fern Platform API
  version: "1.0"
paths:
  /api/v1/admin/audit-logs:
    get:
      description: Returns the audit log of administrative actions (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
